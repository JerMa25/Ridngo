name: Notify yowyob
on:
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - env: { GH_TOKEN: "${{ secrets.YOWYOB_SYNC_TOKEN }}" }
        run: |
          gh api -X POST repos/yowyob/ridngo/dispatches -f event_type=upstream-push
          gh api -X POST repos/yowyob/ridngo-frontend/dispatches -f event_type=upstream-push
